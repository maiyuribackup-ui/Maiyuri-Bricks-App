<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Maiyuri Bricks</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0f172a; color: #e2e8f0;
        font-family: system-ui, -apple-system, sans-serif; }
      .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 12px; text-align: center; padding: 24px; }
      .dot { width: 36px; height: 36px; border-radius: 50%; border: 3px solid #f97316;
        border-top-color: transparent; animation: spin 0.9s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      a { color: #f97316; }
    </style>
  </head>
  <body>
    <!-- Fallback shown only if the remote site can't be reached (e.g. offline).
         Normal operation loads https://mb.maiyuri.com via server.url. -->
    <div class="wrap">
      <div class="dot"></div>
      <p>Loading Maiyuri Bricks…</p>
      <p style="font-size:13px;color:#94a3b8">
        If this persists, check your connection or open
        <a href="https://mb.maiyuri.com">mb.maiyuri.com</a>.
      </p>
    </div>
  </body>
</html>
