name: E2E smoke (production)

# Read-only Playwright smoke suite against mb.maiyuri.com.
# - Runs 5 min after every push to main touching the web app (gives Vercel
#   time to deploy), daily at 05:00 UTC, and on demand.
# - Tier 1 (public surface: login, route protection, API auth walls) always
#   runs. Tier 2 (authenticated money paths) activates once the repo secrets
#   E2E_EMAIL / E2E_PASSWORD hold a dedicated low-privilege test account.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel deploy (push only)
        if: github.event_name == 'push'
        run: sleep 300

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test@1.57.0 dotenv
          npx playwright install --with-deps chromium

      - name: Run smoke suite
        env:
          BASE_URL: https://mb.maiyuri.com
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          CI: "true"
        run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Alert on failure
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ E2E smoke FAILED on production: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
