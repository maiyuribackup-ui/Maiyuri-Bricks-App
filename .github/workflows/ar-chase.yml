name: Receivables chase (overdue invoices)

# 03:30 UTC = 09:00 IST — right when the office opens, the founder gets a
# Telegram list of who owes money and how late they are. Silent when clean.

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch: {}

jobs:
  chase:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger AR chase cron
        run: |
          status=$(curl -s -o /tmp/r.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://mb.maiyuri.com/api/cron/ar-chase")
          echo "HTTP $status"; cat /tmp/r.json
          if [ "$status" -ge 400 ]; then exit 1; fi

      - name: Alert on failure
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ ${{ github.workflow }} failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
