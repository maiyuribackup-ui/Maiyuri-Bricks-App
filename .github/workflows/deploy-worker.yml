name: Deploy Worker to Railway

# Automates the Railway deployment of the call-recording-processor worker.
# Without this, the Railway service only updates when someone manually runs
# `railway up` — which is how the worker went 9 days stale in Jan 2026.
#
# Required repository secret:
#   RAILWAY_TOKEN — a Railway PROJECT token (Railway dashboard → your project
#   → Settings → Tokens → create token for the "production" environment).

on:
  push:
    branches: [main]
    paths:
      - "workers/call-recording-processor/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch: # allow manual deploys from the Actions tab

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy call-recording-processor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: workers/call-recording-processor
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          railway up --service worker --detach

      - name: Notify Telegram on success
        if: success()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="<b>🚂 Worker deployed to Railway</b>%0A%0A<b>Commit:</b> ${{ github.sha }}%0A<b>Author:</b> ${{ github.actor }}%0A%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Run</a>"
          fi

      - name: Notify Telegram on failure
        if: failure()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="<b>❌ Worker deployment FAILED</b>%0A%0A<b>Commit:</b> ${{ github.sha }}%0A%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View logs</a>"
          fi
